# config.yaml - Example with request filtering per rule and response conditions

rules:
  # Rule 1: Test HTTP method enumeration (NEW!)
  - filter:
      url_contains: /api/
    target:
      type: method  # No 'name' field needed for method
    payloads:
      type: list
      source:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
        - HEAD
    conditions:
      match_mode: "any"
      status_code: [200, 201, 204]  # Success responses

  # Rule 2: Test email injection with response conditions (ANY mode - default)
  - filter:
      method: POST
    target:
      type: body
      name: email
    payloads:
      type: file
      source: 'emails.txt'
    conditions:
      match_mode: "any"        # Show if ANY condition matches (default behavior)
      status_code: [200, 201]  # Check for successful responses
      string_in_body: "email"  # Look for "email" in response body
      content_length_gt: 100   # Response larger than 100 bytes

