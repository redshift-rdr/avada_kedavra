# --- Optional Global Settings ---
# threads: 10
# delay: 0.1
# allow_redirects: False
# verify_ssl: False
# timeout: 15

# --- Phase 1 Security Testing Features ---
# Enable via CLI arguments:
#   --baseline-mode          Capture baseline responses without fuzzing
#   --baseline-file FILE     Path to baseline file (default: baselines.json)
#   --diff-analysis          Compare fuzzed responses against baselines
#   --detect-reflection      Detect if payloads are reflected (XSS testing)
#   --auto-throttle          Automatically detect and adapt to rate limiting
#   --waf-detect             Detect Web Application Firewall presence
#
# Workflow Example:
#   1. Capture baselines:  python -m avada_kedavra requests.json --baseline-mode
#   2. Fuzz with analysis: python -m avada_kedavra requests.json -c config.yaml --diff-analysis --detect-reflection
#
# Differential Analysis:
#   - Compares response size, timing, status codes against baseline
#   - Detects new error messages introduced by payloads
#   - Calculates similarity ratio to find anomalies
#   - Highlights: Δ200→500 | Size+234B | Time+15% | ERR!
#
# Reflection Detection:
#   - Checks if payload appears in response body or headers
#   - Detects HTML, URL, and JavaScript encoding
#   - Shows: Reflected(body) | Reflected(both) [html]
#
# Auto-Throttle:
#   - Detects 429/503 status codes and rate limit keywords
#   - Automatically increases delay between requests
#   - Backs off exponentially until rate limit clears
#
# WAF Detection:
#   - Identifies common WAF signatures (Cloudflare, Akamai, etc.)
#   - Shows: WAF:CLOUDFLARE | WAF:MODSECURITY

# --- Flexible Filter & Target Reference ---
# Filter:
#   - Omit 'filter' entirely → rule applies to ALL requests
#   - Set specific filters → rule only applies to matching requests
#
# Target:
#   - Omit 'target' entirely → payload injected into every parameter, one at a time
#   - target: "*"            → same as omitting target (explicit wildcard)
#   - target:
#       type: body           → target all body params (type-scoped wildcard)
#       name: "*"
#   - target:
#       type: url            → target a specific parameter
#       name: id
#
# When using wildcards, each parameter gets its own request with the payload
# injected only into that parameter (sniper mode). Parameters include:
# url params, cookies, headers, and body params (json/form).

# --- Response Conditions Reference ---
# Conditions can be added to any rule to check response characteristics.
# When a condition matches, it will be displayed in the "Error/Conditions" column.
#
# Match Modes:
#   match_mode: "any" (default)     - Show if ANY condition matches (OR logic)
#   match_mode: "all"               - Only show if ALL conditions match (AND logic)
#
# Available conditions:
#   string_in_body: "text"          - Check if string exists in response body
#   string_in_headers: "text"       - Check if string exists in response headers
#   regex_in_body: "pattern"        - Match regex pattern in response body
#   regex_in_headers: "pattern"     - Match regex pattern in response headers
#   status_code: 200 or [200, 201]  - Match specific status code(s)
#   content_length_gt: 1000         - Response size greater than N bytes
#   content_length_lt: 1000         - Response size less than N bytes
#   content_length_eq: 1000         - Response size equals N bytes
#   response_time_gt: 0.5           - Response time greater than N seconds
#   response_time_lt: 2.0           - Response time less than N seconds
#
# Examples:
#   match_mode: "any" - Shows "✓ Body:'error' | Status=500" (both matched)
#   match_mode: "all" - Shows "✓ Body:'error' | Status=500" (only if ALL 3+ conditions matched)
#                       Otherwise shows nothing if not all conditions met